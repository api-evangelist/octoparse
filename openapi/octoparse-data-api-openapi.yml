                title: Response Example
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      offset:
                        type: number
                      total:
                        type: number
                      restTotal:
                        type: number
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            State:
                              type: string
                            City:
                              type: string
                          required:
                          - State
                          - City
                  requestId:
                    type: string
              examples:
                Response Example:
                  value:
                    data:
                      offset: 4
                      total: 100000
                      restTotal: 99996
                      data:
                      - State: Texas
                        City: Plano
                      - State: Texas
                        City: Houston
                      - State: Texas
                        City: Austin
                      - State: Texas
                        City: Arlington
                    requestId: 0HMD469L0I8Q1:00000001
        '400':
          description: Error Example
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Error Example
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                      message:
                        type: string
                  requestId:
                    type: string
              examples:
                Error Example:
                  value:
                    error:
                      code: ServerError
                      message: Internal Server Error
                    requestId: 0HMD469L0I8R0:00000001
  data/markexported:
    post:
      tags:
      - Data
      summary: Octoparse markexported
      description: Mark Data as Exported
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Request Body Example
              type: object
              properties:
                taskId:
                  type: string
                  description: Task ID
              required:
              - taskId
      parameters: []
      responses:
        '200':
          description: Response Example
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Response Example
                type: object
                properties:
                  data:
                    type: 'null'
                  requestId:
                    type: string
              examples:
