naftiko: 1.0.0-alpha2
info:
  label: Octoparse — Cloud_ Extraction
  description: 'Octoparse — Cloud_ Extraction. 2 operations. Lead operation: Octoparse cloudextractionStart. Self-contained
    Naftiko capability covering one Octoparse business surface.'
  tags:
  - Octoparse
  - Cloud_ Extraction
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OCTOPARSE_API_KEY: OCTOPARSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: octoparse-cloud-extraction
    baseUri: https://openapi.octoparse.com
    description: Octoparse — Cloud_ Extraction business capability. Self-contained, no shared references.
    resources:
    - name: cloudextraction-start
      path: cloudextraction/start
      operations:
      - name: post
        method: POST
        description: Octoparse cloudextractionStart
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: cloudextraction-task-subtasks
      path: cloudextraction/task/subtasks
      operations:
      - name: get
        method: GET
        description: Octoparse SubtasksStatus
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: query
          type: string
          description: Task ID
          required: true
        - name: page
          in: query
          type: string
          description: Page number
          required: true
        - name: size
          in: query
          type: string
          description: Number of subtasks a page (1 to 20)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: octoparse-cloud-extraction-rest
    port: 8080
    description: REST adapter for Octoparse — Cloud_ Extraction. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/cloudextraction/start
      name: cloudextraction-start
      description: REST surface for cloudextraction-start.
      operations:
      - method: POST
        name: post
        description: Octoparse cloudextractionStart
        call: octoparse-cloud-extraction.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cloudextraction/task/subtasks
      name: cloudextraction-task-subtasks
      description: REST surface for cloudextraction-task-subtasks.
      operations:
      - method: GET
        name: get
        description: Octoparse SubtasksStatus
        call: octoparse-cloud-extraction.get
        with:
          taskId: rest.taskId
          page: rest.page
          size: rest.size
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: octoparse-cloud-extraction-mcp
    port: 9090
    transport: http
    description: MCP adapter for Octoparse — Cloud_ Extraction. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: octoparse-cloudextractionstart
      description: Octoparse cloudextractionStart
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: octoparse-cloud-extraction.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: octoparse-subtasksstatus
      description: Octoparse SubtasksStatus
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: octoparse-cloud-extraction.get
      with:
        taskId: tools.taskId
        page: tools.page
        size: tools.size
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
