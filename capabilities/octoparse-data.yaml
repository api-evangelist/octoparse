naftiko: 1.0.0-alpha2
info:
  label: Octoparse — Data
  description: 'Octoparse — Data. 5 operations. Lead operation: Octoparse all. Self-contained Naftiko capability covering
    one Octoparse business surface.'
  tags:
  - Octoparse
  - Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OCTOPARSE_API_KEY: OCTOPARSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: octoparse-data
    baseUri: https://openapi.octoparse.com
    description: Octoparse — Data business capability. Self-contained, no shared references.
    resources:
    - name: data-all
      path: data/all
      operations:
      - name: get
        method: GET
        description: Octoparse all
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: query
          type: string
          description: Task ID
          required: true
        - name: offset
          in: query
          type: string
          description: Data offset. When offset=0, you can get data from the first data row.
          required: true
        - name: size
          in: query
          type: string
          description: The amount of data rows(range from 1 to 1000).
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: data-lotno-all
      path: data/lotno/all
      operations:
      - name: get
        method: GET
        description: Octoparse lotnoAll
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: query
          type: string
          description: Task Id
          required: true
        - name: lotno
          in: query
          type: string
          description: Batch ID
          required: true
        - name: offset
          in: query
          type: string
          description: Data offset. When offset=0, you can get data from the first data row.
          required: true
        - name: size
          in: query
          type: string
          description: The amount of data rows (range from 1 to 1000).
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: data-markexported
      path: data/markexported
      operations:
      - name: post
        method: POST
        description: Octoparse markexported
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: data-notexported
      path: data/notexported
      operations:
      - name: get
        method: GET
        description: Octoparse notexported
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskId
          in: query
          type: string
          description: Task ID
          required: true
        - name: size
          in: query
          type: string
          description: The amount of data rows(range from 1 to 1000)
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: data-remove
      path: data/remove
      operations:
      - name: post
        method: POST
        description: Octoparse remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: octoparse-data-rest
    port: 8080
    description: REST adapter for Octoparse — Data. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/data/all
      name: data-all
      description: REST surface for data-all.
      operations:
      - method: GET
        name: get
        description: Octoparse all
        call: octoparse-data.get
        with:
          taskId: rest.taskId
          offset: rest.offset
          size: rest.size
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/lotno/all
      name: data-lotno-all
      description: REST surface for data-lotno-all.
      operations:
      - method: GET
        name: get
        description: Octoparse lotnoAll
        call: octoparse-data.get
        with:
          taskId: rest.taskId
          lotno: rest.lotno
          offset: rest.offset
          size: rest.size
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/markexported
      name: data-markexported
      description: REST surface for data-markexported.
      operations:
      - method: POST
        name: post
        description: Octoparse markexported
        call: octoparse-data.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/notexported
      name: data-notexported
      description: REST surface for data-notexported.
      operations:
      - method: GET
        name: get
        description: Octoparse notexported
        call: octoparse-data.get
        with:
          taskId: rest.taskId
          size: rest.size
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/data/remove
      name: data-remove
      description: REST surface for data-remove.
      operations:
      - method: POST
        name: post
        description: Octoparse remove
        call: octoparse-data.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: octoparse-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for Octoparse — Data. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: octoparse-all
      description: Octoparse all
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: octoparse-data.get
      with:
        taskId: tools.taskId
        offset: tools.offset
        size: tools.size
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: octoparse-lotnoall
      description: Octoparse lotnoAll
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: octoparse-data.get
      with:
        taskId: tools.taskId
        lotno: tools.lotno
        offset: tools.offset
        size: tools.size
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: octoparse-markexported
      description: Octoparse markexported
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: octoparse-data.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: octoparse-notexported
      description: Octoparse notexported
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: octoparse-data.get
      with:
        taskId: tools.taskId
        size: tools.size
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: octoparse-remove
      description: Octoparse remove
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: octoparse-data.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
