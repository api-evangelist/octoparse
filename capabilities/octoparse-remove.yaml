naftiko: 1.0.0-alpha2
info:
  label: Octoparse — Remove
  description: 'Octoparse — Remove. 1 operations. Lead operation: Octoparse remove. Self-contained Naftiko capability covering
    one Octoparse business surface.'
  tags:
  - Octoparse
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OCTOPARSE_API_KEY: OCTOPARSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: octoparse-remove
    baseUri: https://openapi.octoparse.com
    description: Octoparse — Remove business capability. Self-contained, no shared references.
    resources:
    - name: data-remove
      path: data/remove
      operations:
      - name: post
        method: POST
        description: Octoparse remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: octoparse-remove-rest
    port: 8080
    description: REST adapter for Octoparse — Remove. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/data/remove
      name: data-remove
      description: REST surface for data-remove.
      operations:
      - method: POST
        name: post
        description: Octoparse remove
        call: octoparse-remove.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: octoparse-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for Octoparse — Remove. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: octoparse-remove
      description: Octoparse remove
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: octoparse-remove.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
