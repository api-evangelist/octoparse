naftiko: 1.0.0-alpha2
info:
  label: Octoparse — Move
  description: 'Octoparse — Move. 1 operations. Lead operation: Octoparse MoveToGroup. Self-contained Naftiko capability covering
    one Octoparse business surface.'
  tags:
  - Octoparse
  - Move
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OCTOPARSE_API_KEY: OCTOPARSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: octoparse-move
    baseUri: https://openapi.octoparse.com
    description: Octoparse — Move business capability. Self-contained, no shared references.
    resources:
    - name: task-moveToGroup
      path: task/moveToGroup
      operations:
      - name: post
        method: POST
        description: Octoparse MoveToGroup
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: taskGroupId
          in: query
          type: string
          description: Task group ID
          required: true
        - name: taskId
          in: query
          type: string
          description: Task ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: octoparse-move-rest
    port: 8080
    description: REST adapter for Octoparse — Move. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/task/movetogroup
      name: task-movetogroup
      description: REST surface for task-moveToGroup.
      operations:
      - method: POST
        name: post
        description: Octoparse MoveToGroup
        call: octoparse-move.post
        with:
          taskGroupId: rest.taskGroupId
          taskId: rest.taskId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: octoparse-move-mcp
    port: 9090
    transport: http
    description: MCP adapter for Octoparse — Move. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: octoparse-movetogroup
      description: Octoparse MoveToGroup
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: octoparse-move.post
      with:
        taskGroupId: tools.taskGroupId
        taskId: tools.taskId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
