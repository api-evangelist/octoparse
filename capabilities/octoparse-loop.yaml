naftiko: 1.0.0-alpha2
info:
  label: Octoparse — Loop
  description: 'Octoparse — Loop. 1 operations. Lead operation: Octoparse updateLoopItems. Self-contained Naftiko capability
    covering one Octoparse business surface.'
  tags:
  - Octoparse
  - Loop
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OCTOPARSE_API_KEY: OCTOPARSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: octoparse-loop
    baseUri: https://openapi.octoparse.com
    description: Octoparse — Loop business capability. Self-contained, no shared references.
    resources:
    - name: task-updateLoopItems
      path: task/updateLoopItems
      operations:
      - name: post
        method: POST
        description: Octoparse updateLoopItems
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: octoparse-loop-rest
    port: 8080
    description: REST adapter for Octoparse — Loop. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/task/updateloopitems
      name: task-updateloopitems
      description: REST surface for task-updateLoopItems.
      operations:
      - method: POST
        name: post
        description: Octoparse updateLoopItems
        call: octoparse-loop.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: octoparse-loop-mcp
    port: 9090
    transport: http
    description: MCP adapter for Octoparse — Loop. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: octoparse-updateloopitems
      description: Octoparse updateLoopItems
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: octoparse-loop.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
